task_dataset:
  DREAMS_Pointwise_PointSeg:
    task_name: point_segmentation
    dataset: DREAMS
    data: dreams_pointseg
    root_path: data/dreams_pointwise
    embed: fixed
    window_T: 256
    stride_T: 128
    fs: 256
    num_classes: 2
    enc_in: 1
    # 纺锤波典型频段；use_envelope=true 时为 11–16 Hz 带通 + Hilbert 包络，否则仅带通
    filter_low_hz: 11
    filter_high_hz: 16
    use_envelope: true
    split_files:
      train: splits/train.txt
      val: splits/val.txt
      test: splits/test.txt

